version: '3.8'

services:

  # ─────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: gradproject_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"         # احذف السطر ده في Production
    networks:
      - app_network

  # ─────────────────────────────────────────
  # Node.js Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: .              # مسار فولدر الـ Node (نفس مكان الـ Dockerfile)
      dockerfile: Dockerfile
    container_name: gradproject_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/bookLibrary   # "mongo" هو اسم الـ service فوق
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    volumes:
      - uploads_data:/app/uploads    # عشان الملفات المرفوعة متتمسحش
    depends_on:
      - mongo
    networks:
      - app_network

# ─────────────────────────────────────────
# Volumes & Network
# ─────────────────────────────────────────
volumes:
  mongo_data:
  uploads_data:

networks:
  app_network:
    driver: bridge
